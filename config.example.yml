bot:
  token: "YOUR_DISCORD_BOT_TOKEN_HERE"
  prefix: "s."
  owner: 123456789012345678
  instance_id: "serenya-1"
  display_name: "Serenya"

logging:
  level: debug
  webhook_enabled: false
  webhook_url: "YOUR_DISCORD_WEBHOOK_URL_HERE"
  webhook_min_level: debug
  webhook_plain_text: true

spotify:
  enabled: true
  sp_dc: "YOUR_SPOTIFY_SP_DC_COOKIE_HERE"
  enable_track: true
  enable_playlist: true
  enable_album: true
  enable_artist_top_tracks: true
  enable_text_search: true
  max_playlist_import: 500
  max_album_import: 500
  max_artist_top_tracks: 50
  market: "VN"

playback:
  stay_in_voice: true
  announce_track: true
  max_queue_size: 1000
  max_playlist_import: 500
  max_user_playlists: 10
  max_tracks_per_user_playlist: 500

resolver:
  max_concurrent_ytdlp: 4
  max_concurrent_resolves_per_guild: 2
  global_search_timeout_ms: 3500
  deezer_timeout_ms: 800
  apple_music_timeout_ms: 800
  youtube_music_timeout_ms: 2000
  soundcloud_timeout_ms: 2000
  spotify_timeout_ms: 800
  youtube_timeout_ms: 2000
  ytsearch_timeout_ms: 3000
  yt_dlp_timeout_seconds: 10
  prefetch_timeout_seconds: 8
  prefetch_when_remaining_seconds: 10
  query_cache_ttl_seconds: 3600
  metadata_cache_ttl_seconds: 86400
  stream_cache_ttl_seconds: 3600
  negative_cache_ttl_seconds: 1800
  auto_pick_threshold: 0.90
  perfect_threshold: 0.97
  enable_ytdlp_youtube_fallback: false
  enable_spotify_embed_fallback: true

emojis:
  spotify: "<:spotify:123456789>"
  youtube: "<:youtube:123456789>"
  soundcloud: "<:soundcloud:123456789>"
  apple_music: "<:apple:123456789>"
  deezer: "<:deezer:123456789>"
  default: "💿"
