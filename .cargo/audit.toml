    "RUSTSEC-2025-0057", # fxhash unmaintained
    "RUSTSEC-2024-0384", # instant unmaintained
    "RUSTSEC-2024-0436", # paste unmaintained
    "RUSTSEC-2026-0173", # proc-macro-error2 unmaintained
    "RUSTSEC-2026-0124", # libcrux-chacha20poly1305 overlong buffer panic
    "RUSTSEC-2026-0104", # rustls-webpki crl parser panic
    "RUSTSEC-2026-0049", # rustls-webpki crl matching logic
    "RUSTSEC-2026-0099", # rustls-webpki name constraints wildcard
    "RUSTSEC-2026-0098", # rustls-webpki name constraints uri
]
